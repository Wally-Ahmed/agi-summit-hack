# Static serving with always-revalidate semantics: browsers must check back on every
# load (etag makes unchanged answers a cheap 304), so a fresh deploy is visible on a
# plain reload — no more stale cached copies after each iteration.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Cache-Control "no-cache" always;

    location / {
        try_files $uri $uri/ =404;
    }
}
